name: Release

# Builds Luma.dmg + Luma.zip and publishes them as GitHub Release assets:
#   • every push to `main` updates the rolling "latest" release
#   • pushing a tag like `v1.0.0` creates a versioned release
#   • it can also be run manually from the Actions tab
#
# NOTE: Luma compiles against the macOS 26 SDK (Liquid Glass, guarded at
# runtime), so the runner needs Xcode 26+. If the `macos-26` label is ever
# unavailable, switch to the newest macOS image that ships Xcode 26.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select newest stable Xcode
        run: |
          # Prefer the newest NON-beta Xcode; fall back to anything named Xcode*.
          XCODE="$(ls -d /Applications/Xcode*.app | grep -vi beta | sort -V | tail -1)"
          [ -n "$XCODE" ] || XCODE="$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          echo "Using $XCODE"
          sudo xcode-select -switch "$XCODE"
          sudo xcodebuild -runFirstLaunch || true
          xcodebuild -version
          xcodebuild -showsdks | grep macosx || true

      - name: Install create-dmg (styled installer window)
        run: brew install create-dmg || true

      - name: Build DMG + app zip
        run: |
          set -o pipefail
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh 2>&1 | tee build-output.log

      - name: Show build errors
        if: failure()
        run: |
          echo "──── xcodebuild errors ────"
          grep -E "(error|FAILED|failed)" build-output.log | head -60 || true

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build-output.log

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luma
          path: |
            build/Luma.dmg
            build/Luma.zip

      - name: Publish versioned release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Luma.dmg
            build/Luma.zip
          generate_release_notes: true
          body: |
            ## Install
            Download **Luma.dmg**, open it, and drag Luma into Applications
            (or download **Luma.zip** and unzip straight to an app).

            The app isn’t notarized, so the first launch needs one extra step:
            **right-click Luma.app → Open → Open**, or run
            `xattr -cr /Applications/Luma.app`.

      - name: Publish rolling "latest" release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Luma Latest Build
          prerelease: true
          files: |
            build/Luma.dmg
            build/Luma.zip
          body: |
            Automatic build of the newest code on `main`
            (commit ${{ github.sha }}).

            ## Install
            Download **Luma.dmg**, open it, and drag Luma into Applications
            (or download **Luma.zip** and unzip straight to an app).

            The app isn’t notarized, so the first launch needs one extra step:
            **right-click Luma.app → Open → Open**, or run
            `xattr -cr /Applications/Luma.app`.
