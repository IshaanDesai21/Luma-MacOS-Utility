name: Release

# Builds a DMG and publishes it to a GitHub Release whenever you push a tag
# like `v1.0.0`. You can also run it manually from the Actions tab.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# NOTE: Luma uses the macOS 26 "Liquid Glass" API (guarded at runtime), so the
# runner must have Xcode 26+ installed. Adjust the Xcode version below once
# GitHub's images ship it; until then, build locally with ./scripts/build-dmg.sh
# and upload the DMG to the release manually.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -switch /Applications/Xcode.app
          xcodebuild -version

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Luma-dmg
          path: build/Luma.dmg

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Luma.dmg
          generate_release_notes: true
